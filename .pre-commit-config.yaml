# GENERATED by cc-guides from .claude/fragments/.pre-commit-config.yaml/ — do not edit; edit the fragments and run 'cc-guides render'.
# Commit-time checks, composed by cc-guides from the shared cc-skills pack.
# Run by prek — a fast Rust drop-in for pre-commit: `ccx vcs ship` runs these
# hooks before every commit, and `uvx prek install` wires them into plain
# `git commit` too.
# prek-only: the `repo: builtin` hooks are prek-native (Rust, offline, no rev);
# legacy pre-commit cannot parse this file.
# Rev pins are centrally managed in the cc-skills pack fragments — a local
# `uvx prek autoupdate` shows up as drift and the daily re-render reverts it.
repos:
  - repo: builtin
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        # Skill template trees hold moustache sources ({{#SECTION}} markers,
        # {{TOKEN}} mid-scalar) that are not YAML documents; they are
        # validated post-render. Inert in repos without such paths.
        exclude: ^plugins/[^/]+/skills/[^/]+/templates/
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        # 1 MiB, not the 500 KB default: gen-image compresses repo brand images
        # (banners, social cards) to just under 1 MiB.
        args: [--maxkb=1024]
      - id: detect-private-key

# Go: gofumpt + goimports formatting and the golangci-lint suite, both driven
# by the repo's .golangci.yml. Continues the `repos:` list precommit-base opens.
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.12.2
    hooks:
      - id: golangci-lint-fmt
      - id: golangci-lint
