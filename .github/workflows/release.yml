name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    uses: yasyf/homebrew-tap/.github/workflows/release-go.yml@52b26a1684d94ae2669d124f844148deaa4f5baf
    secrets: inherit
    with:
      # synckitd ships as a formula (livecheck + `brew install --HEAD` source build)
      # rendered from its template; goreleaser builds with no homebrew block.
      render-formula: true
      formula-template: .github/formula/synckitd.rb.tmpl
      formula-name: synckitd
